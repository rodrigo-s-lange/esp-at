version: "1.0.0"

description: >
  AT command parser over UART0 with ANSI color output, local echo,
  backspace support and dynamic thread-safe command registration.
  Color tokens (G Y R B W O P C M K) via compile-time string concatenation —
  zero runtime overhead. Compatible with the full ESP32 family.

url: "https://github.com/rodrigo-s-lange/esp_at"
repository: "https://github.com/rodrigo-s-lange/esp_at.git"

license: "MIT"

targets:
  - esp32
  - esp32c3
  - esp32c6
  - esp32s3

dependencies:
  idf:
    version: ">=5.0.0"
